<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-image: url(imagens/fundo.jpg);
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            min-height: 100vh;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            cursor: url(/glove/Glove\ Normal.cur), auto;
        }

        .barra {
            /*a barra do windowns, nao serve pra nada, a principio.*/
            position: fixed;

            bottom: 0;
            width: 100vw;

            height: 3vw;

            display: block;
        }

        a {
  
                position: fixed;
                
            cursor: url(/glove/Glove\ Link.cur), pointer;
      
        }

        a img {

            width: 60vw;

            min-width: 300px;

            height: auto;
        }
        a img:hover {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }
        .nota{
           margin-top: 50px;
           margin-left: 50px;
        }
    </style>

</head>

<body back>
    <img class="barra" src="/imagens/barra.jpg">

    <a href="index.html">
        <img src="/imagens/sobre.png" class="nota">
    </a>
</body>

</html>

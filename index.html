<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url(imagens/fundo.jpg);
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            min-height: 100vh;
            background-attachment: fixed;
            margin: 0;
        }

        h1 {
            margin: 100px;
            color: transparent;
            font-size: 60px;
            font-family: "Kaushan Script", cursive;
            margin: 0;
            text-align: center;
            background-image: url(https://i.pinimg.com/1200x/59/69/6e/59696e759fbc52825aa675c2696b3d64.jpg);
            -webkit-background-clip: text;
            background-clip: text;
            background-position: center;
            background-repeat: no-repeat;

            display: inline;
        }

        .barra {
            position: fixed;

            bottom: 0;
            width: 100vw;
            
            height: 3vw;
            
            display: block;
        }
    </style>




</head>

<body>
    <h1>-Portifólio </h1>
    <h1>Acadêmico-</h1>
    <img class="barra" src="/imagens/barra.jpg">
</body>

</html>
